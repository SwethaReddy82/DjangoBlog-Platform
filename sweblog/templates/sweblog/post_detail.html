{% extends "sweblog/base.html" %}
{% block content %}
<article class="media content-section">
  <div class="media-body">
    <div class="article-metadata">
      <span class="mr-2">{{ object.author }}</span>
      <small class="text-muted">{{ object.date_posted|date:"F d, Y" }}</small>
    </div>
    <h2 class="article-title">{{ object.title }}</h2>
    <p class="article-content">{{ object.content }}</p>
    {% if user == object.author %}
      <a class="btn btn-outline-secondary btn-sm mt-2" href="{% url 'post-update' object.pk %}">Edit</a>
      <a class="btn btn-outline-danger btn-sm mt-2" href="{% url 'post-delete' object.pk %}">Delete</a>
    {% endif %}
  </div>
</article>
{% endblock content %}
